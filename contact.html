<section>
    <h2>Contact Me</h2>

    <form id="contact-form" action="mailto:hwerutanyaradzwa@gmail.com" method="post" enctype="text/plain">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Your name" value="Tanyaradzwa Hweru" required minlength="2">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" value="hwerutanyaradzwa@gmail.com" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Write your message here" required minlength="10" rows="6"></textarea>

        <button type="submit" class="btn">Send</button>
    </form>

    <p>Email: <a href="mailto:hwerutanyaradzwa@gmail.com">hwerutanyaradzwa@gmail.com</a></p>
